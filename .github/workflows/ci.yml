name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check No Space Files
        run: npm run check:no-space-files

      - name: Check Schema Drift
        run: npm run check:schema-drift

      - name: Build
        run: npm run build

  integration-real-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jgg_integration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jgg_integration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Integration Tests (Real DB)
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/jgg_integration_test
        run: npm run test:integration

  release-readiness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jgg_integration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jgg_integration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/jgg_integration_test
      REQUIRE_INTEGRATION_TESTS: "true"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Release Readiness Check
        run: npm run release:check
